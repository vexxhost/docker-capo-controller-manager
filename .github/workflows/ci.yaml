name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write
  id-token: write
  packages: write
  security-events: write

jobs:
  image:
    uses: vexxhost/github-actions/.github/workflows/image.yml@main
    with:
      image-ref: ghcr.io/${{ github.repository_owner }}/capo-controller-manager
      tags: |
        type=sha,suffix=-0.11.5-1
        type=raw,value=0.11.5-1
        type=raw,value=0.11.5-1-{{date 'X'}}
      push: ${{ github.ref == 'refs/heads/main' }}
